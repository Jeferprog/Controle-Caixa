<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-green: #005c46;
      --accent-orange: #f58220;
      --bg-body: #f8f9fa;
      --bg-card: #ffffff;
      --text-dark: #212529;
      --text-gray: #6c757d;
      --border-gray: #dee2e6;
      --success-green: #28a745;
      --danger-red: #dc3545;
      --info-blue: #0d6efd;
      --border-radius: 8px;
    }

    body { 
      font-family: 'Roboto', sans-serif; 
      background-color: var(--bg-body);
      color: var(--text-dark);
    }

    @media print {
      .no-print { display: none !important; }
      body { background: white; padding: 0; }
      .print-area { border: 1px solid var(--border-gray) !important; padding: 1rem !important; margin: 0 !important; }
      .page-break { page-break-after: always; break-after: page; }
      .print-separator { 
        border-top: 2px dashed var(--border-gray) !important; 
        margin: 2rem 0 !important;
        display: block !important;
      }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    #qrcode-svg-container svg { margin: 0 auto; display: block; }
    
    .transition-all { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .nav-active {
      background-color: rgba(0, 92, 70, 0.05);
      color: var(--primary-green);
      border-right: 3px solid var(--primary-green);
    }

    .custom-table th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: white;
      background-color: var(--primary-green);
      font-weight: 600;
      padding: 0.75rem 1rem;
    }
    .custom-table td {
      padding: 0.75rem 1rem;
      vertical-align: middle;
      border-bottom: 1px solid var(--border-gray);
    }
    
    .sidebar-scroll::-webkit-scrollbar { width: 4px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border-gray); border-radius: 10px; }

    @keyframes slideUp {
      from { transform: translate(-50%, 100%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    .animate-toast {
      animation: slideUp 0.3s ease-out forwards;
    }

    /* Professional Card Hover */
    .hover-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    /* Custom Scrollbar for Main Content */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-body);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-gray);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-gray);
    }
  </style>
</head>
<body class="text-slate-900 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Utils ---
    const run = (funcName, ...args) => {
      return new Promise((resolve, reject) => {
        if (typeof google === 'undefined' || !google.script || !google.script.run) {
          const msg = "Google Apps Script API não disponível. Verifique se o script está sendo executado dentro do Google Sheets/Drive.";
          console.error(msg);
          reject(new Error(msg));
          return;
        }
        
        const runner = google.script.run
          .withSuccessHandler((res) => {
            resolve(res);
          })
          .withFailureHandler((err) => {
            console.error(`Erro na função server-side ${funcName}:`, err);
            reject(err);
          });
          
        if (typeof runner[funcName] !== 'function') {
          const msg = `A função "${funcName}" não foi encontrada no servidor (Code.gs). Verifique se o nome está correto e se o script foi salvo.`;
          console.error(msg);
          reject(new Error(msg));
          return;
        }
        
        try {
          runner[funcName](...args);
        } catch (e) {
          console.error(`Exceção ao chamar ${funcName}:`, e);
          reject(e);
        }
      });
    };

    const resizeImage = (base64Str, maxWidth = 250, maxHeight = 250) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.src = base64Str;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          if (width > height) {
            if (width > maxWidth) {
              height *= maxWidth / width;
              width = maxWidth;
            }
          } else {
            if (height > maxHeight) {
              width *= maxHeight / height;
              height = maxHeight;
            }
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
      });
    };

    // --- PIX Generator ---
    function calculateCRC16(str) {
      let crc = 0xFFFF;
      const polynomial = 0x1021;
      for (let i = 0; i < str.length; i++) {
        let b = str.charCodeAt(i);
        for (let j = 0; j < 8; j++) {
          const bit = ((b >> (7 - j)) & 1) === 1;
          const c15 = ((crc >> 15) & 1) === 1;
          crc <<= 1;
          if (c15 !== bit) crc ^= polynomial;
        }
      }
      crc &= 0xFFFF;
      return crc.toString(16).padStart(4, '0').toUpperCase();
    }

    function generatePixPayload({ pixKey, merchantName, merchantCity, amount, description }) {
      const clean = (v, removeSpaces = false) => {
        let res = String(v || "").trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9\s]/g, "");
        if (removeSpaces) res = res.replace(/\s/g, "");
        return res;
      };
      const formatField = (id, value) => {
        const val = String(value || "");
        return `${id}${val.length.toString().padStart(2, '0')}${val}`;
      };
      const key = clean(pixKey, true);
      if (!key) return "";
      try {
        const merchantAccount = formatField('00', 'BR.GOV.BCB.PIX') + formatField('01', key);
        const additionalData = formatField('05', clean(description, true).substring(0, 25) || '***');
        let payload = [
          formatField('00', '01'),
          formatField('26', merchantAccount),
          formatField('52', '0000'),
          formatField('53', '986'),
          amount ? formatField('54', Number(amount).toFixed(2)) : '',
          formatField('58', 'BR'),
          formatField('59', clean(merchantName).substring(0, 25) || 'ASSOCIACAO'),
          formatField('60', clean(merchantCity, true).substring(0, 15) || 'SAOPAULO'),
          formatField('62', additionalData)
        ].join('');
        return payload + '6304' + calculateCRC16(payload + '6304');
      } catch (e) {
        return "";
      }
    }

    // --- Components ---
    const PixQRCode = ({ value }) => {
      const containerRef = useRef(null);
      useEffect(() => {
        if (containerRef.current && value && window.qrcode) {
          try {
            const qr = qrcode(0, 'M');
            qr.addData(value);
            qr.make();
            containerRef.current.innerHTML = qr.createSvgTag(3, 0);
          } catch (e) {
            containerRef.current.innerHTML = "<p class='text-[8px] text-red-500'>Erro no QR Code</p>";
          }
        }
      }, [value]);
      return (
        <div className="bg-white p-2 border border-slate-100 rounded-lg shadow-sm">
          <div ref={containerRef} id="qrcode-svg-container"></div>
        </div>
      );
    };

    const Icon = ({ name, size = 18, className = "" }) => {
      const containerRef = useRef(null);
      useEffect(() => {
        if (window.lucide && containerRef.current) {
          containerRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;" class="${className}"></i>`;
          try {
            window.lucide.createIcons({
              root: containerRef.current
            });
          } catch (e) {
            console.error("Erro ao criar ícone:", e);
          }
        }
      }, [name, size, className]);
      return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
    };

    const Card = ({ children, title, action, subtitle, className = "" }) => (
      <div className={`bg-white rounded-lg shadow-sm border border-border-gray overflow-hidden transition-all border-l-4 border-l-[#f58220] ${className}`}>
        {(title || action) && (
          <div className="px-5 py-4 border-b border-border-gray flex justify-between items-center bg-[#f8f9fa]">
            <div>
              <h3 className="font-bold text-[#005c46] text-sm uppercase tracking-wider">{title}</h3>
              {subtitle && <p className="text-xs text-[#6c757d] mt-0.5">{subtitle}</p>}
            </div>
            {action}
          </div>
        )}
        <div className="p-5">{children}</div>
      </div>
    );

    const StatCard = ({ title, value, icon, color = "green" }) => {
      const colors = {
        green: "bg-[#005c46]/10 text-[#005c46] border-[#005c46]/20",
        orange: "bg-[#f58220]/10 text-[#f58220] border-[#f58220]/20",
        red: "bg-rose-50 text-rose-600 border-rose-100",
        blue: "bg-blue-50 text-blue-600 border-blue-100",
        gray: "bg-slate-50 text-slate-600 border-slate-100"
      };
      return (
        <div className="bg-white p-5 rounded-xl border border-border-gray shadow-sm flex items-center gap-4 hover-card transition-all border-b-4 border-b-[#f58220]">
          <div className={`p-3 rounded-lg border ${colors[color] || colors.green}`}>
            <Icon name={icon} size={24} />
          </div>
          <div>
            <p className="text-[10px] font-bold text-[#6c757d] uppercase tracking-wider mb-0.5">{title}</p>
            <p className="text-xl font-black text-[#212529]">{value}</p>
          </div>
        </div>
      );
    };

    const Button = ({ children, onClick, variant = "primary", className = "", icon, disabled, type = "button" }) => {
      const variants = {
        primary: "bg-[#f58220] text-white hover:bg-[#e47110] shadow-orange-100",
        secondary: "bg-white text-[#212529] border border-border-gray hover:bg-[#f8f9fa]",
        danger: "bg-rose-600 text-white hover:bg-rose-700 shadow-rose-100",
        ghost: "bg-transparent text-[#6c757d] hover:bg-[#f8f9fa] hover:text-[#212529]",
        success: "bg-[#005c46] text-white hover:bg-[#004a38] shadow-green-100"
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`px-4 py-2.5 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-sm ${variants[variant]} ${className}`}
        >
          {icon && <Icon name={icon} size={18} />}
          {children}
        </button>
      );
    };

    const Input = ({ label, ...props }) => (
      <div className="space-y-1.5">
        {label && <label className="text-[11px] font-bold text-[#6c757d] uppercase tracking-wider ml-0.5">{label}</label>}
        <input
          {...props}
          className="w-full px-4 py-2.5 bg-[#f8f9fa] border border-border-gray rounded-lg outline-none focus:ring-2 focus:ring-[#005c46]/20 focus:border-[#005c46] transition-all text-sm font-medium placeholder:text-slate-400"
        />
      </div>
    );

    const Select = ({ label, children, ...props }) => (
      <div className="space-y-1.5">
        {label && <label className="text-[11px] font-bold text-[#6c757d] uppercase tracking-wider ml-0.5">{label}</label>}
        <select
          {...props}
          className="w-full px-4 py-2.5 bg-[#f8f9fa] border border-border-gray rounded-lg outline-none focus:ring-2 focus:ring-[#005c46]/20 focus:border-[#005c46] transition-all text-sm font-medium appearance-none"
        >
          {children}
        </select>
      </div>
    );

    const Toast = ({ message, type = 'success', onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);

      const colors = {
        success: "bg-[#28a745] text-white",
        error: "bg-[#dc3545] text-white",
        info: "bg-[#212529] text-white"
      };

      return (
        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] animate-toast">
          <div className={`${colors[type]} px-6 py-3 rounded-full shadow-lg flex items-center gap-3 font-semibold text-sm whitespace-nowrap`}>
            <Icon name={type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'} size={18} />
            {message}
          </div>
        </div>
      );
    };

    const ConfirmModal = ({ title, message, onConfirm, onCancel }) => (
      <div className="fixed inset-0 bg-[#212529]/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
        <div className="bg-white w-full max-w-sm rounded-xl shadow-2xl overflow-hidden animate-toast border-l-8 border-l-[#f58220]">
          <div className="p-6 text-center">
            <div className="w-14 h-14 bg-[#005c46]/10 text-[#005c46] rounded-full flex items-center justify-center mx-auto mb-4">
              <Icon name="help-circle" size={28} />
            </div>
            <h3 className="text-lg font-bold text-[#212529] mb-2">{title}</h3>
            <p className="text-sm text-[#6c757d] leading-relaxed">{message}</p>
          </div>
          <div className="p-4 bg-[#f8f9fa] flex gap-3 border-t border-[#dee2e6]">
            <Button onClick={onCancel} variant="secondary" className="flex-1">Cancelar</Button>
            <Button onClick={onConfirm} className="flex-1">Confirmar</Button>
          </div>
        </div>
      </div>
    );

    const MemberModal = ({ onSave, onCancel, member = null }) => {
      const [name, setName] = useState(member ? member.nome : '');
      const [cpf, setCpf] = useState(member ? member.cpf : '');

      return (
        <div className="fixed inset-0 bg-[#212529]/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden animate-toast border-l-8 border-l-[#f58220]">
            <div className="p-6">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold text-[#212529]">
                  {member ? 'Editar Associado' : 'Novo Associado'}
                </h3>
                <button onClick={onCancel} className="text-[#6c757d] hover:text-[#212529] transition-colors"><Icon name="x" size={20} /></button>
              </div>
              <div className="space-y-4">
                <Input label="Nome Completo" value={name} onChange={e => setName(e.target.value)} placeholder="Ex: João Silva" />
                <Input label="CPF" value={cpf} onChange={e => setCpf(e.target.value)} placeholder="000.000.000-00" />
              </div>
            </div>
            <div className="p-4 bg-[#f8f9fa] flex gap-3 border-t border-[#dee2e6]">
              <Button onClick={onCancel} variant="secondary" className="flex-1">Cancelar</Button>
              <Button onClick={() => onSave({ id: member?.id, name, cpf })} className="flex-1">
                {member ? 'Salvar Alterações' : 'Salvar Associado'}
              </Button>
            </div>
          </div>
        </div>
      );
    };

    const PaymentModal = ({ installment, onConfirm, onCancel }) => {
      return (
        <div className="fixed inset-0 bg-[#212529]/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden animate-toast border-l-8 border-l-[#f58220]">
            <div className="p-6 text-center">
              <div className="w-14 h-14 bg-[#28a745]/10 text-[#28a745] rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="check-circle" size={28} />
              </div>
              <h3 className="text-lg font-bold text-[#212529] mb-2">Confirmar Pagamento</h3>
              <p className="text-sm text-[#6c757d] leading-relaxed">
                Deseja registrar este recebimento no fluxo de caixa?
              </p>
              <div className="mt-4 p-4 bg-[#f8f9fa] rounded-lg text-left border border-[#dee2e6]">
                <p className="text-[10px] font-bold text-[#6c757d] uppercase tracking-wider">Associado</p>
                <p className="font-bold text-[#212529]">{installment.member_name}</p>
                <p className="text-[10px] font-bold text-[#6c757d] uppercase tracking-wider mt-2">Valor</p>
                <p className="font-bold text-[#212529] text-lg">R$ {installment.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
              </div>
            </div>
            <div className="p-4 bg-[#f8f9fa] flex flex-col gap-2 border-t border-[#dee2e6]">
              <div className="flex gap-3">
                <Button onClick={() => onConfirm(false)} variant="success" className="flex-1">
                  Sim, Registrar Caixa
                </Button>
                <Button onClick={() => onConfirm(true)} variant="secondary" className="flex-1">
                  Não, Apenas Baixar
                </Button>
              </div>
              <Button onClick={onCancel} variant="ghost" className="w-full">
                Cancelar
              </Button>
            </div>
          </div>
        </div>
      );
    };

    const UserModal = ({ onSave, onCancel, user = null }) => {
      const [username, setUsername] = useState(user ? user.usuario : '');
      const [password, setPassword] = useState('');
      const [name, setName] = useState(user ? user.nome : '');
      const [role, setRole] = useState(user ? user.role : 'USER');

      return (
        <div className="fixed inset-0 bg-[#212529]/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-md rounded-xl shadow-2xl overflow-hidden animate-toast border-l-8 border-l-[#f58220]">
            <div className="p-6">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold text-[#212529]">
                  {user ? 'Editar Usuário' : 'Novo Usuário'}
                </h3>
                <button onClick={onCancel} className="text-[#6c757d] hover:text-[#212529] transition-colors"><Icon name="x" size={20} /></button>
              </div>
              <div className="space-y-4">
                <Input label="Nome" value={name} onChange={e => setName(e.target.value)} placeholder="Nome do Usuário" />
                <Input label="Login" value={username} onChange={e => setUsername(e.target.value)} placeholder="Usuário" />
                <Input
                  label={user ? 'Nova Senha (deixe em branco para manter)' : 'Senha'}
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  placeholder={user ? '••••••••' : 'Senha'}
                />
                <Select label="Nível de Acesso" value={role} onChange={e => setRole(e.target.value)}>
                  <option value="USER">Usuário Comum</option>
                  <option value="ADMIN">Administrador</option>
                </Select>
              </div>
            </div>
            <div className="p-4 bg-[#f8f9fa] flex gap-3 border-t border-[#dee2e6]">
              <Button onClick={onCancel} variant="secondary" className="flex-1">Cancelar</Button>
              <Button onClick={() => onSave({ id: user?.id, username, password, name, role })} className="flex-1">
                Salvar
              </Button>
            </div>
          </div>
        </div>
      );
    };

    const ReconciliationModal = ({ data, onConfirm, onCancel }) => {
      return (
        <div className="fixed inset-0 bg-[#212529]/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-4xl rounded-xl shadow-2xl overflow-hidden animate-toast max-h-[90vh] flex flex-col border-l-8 border-l-[#f58220]">
            <div className="p-6 border-b border-[#dee2e6] bg-[#f8f9fa]">
              <div className="flex justify-between items-center">
                <div>
                  <h3 className="text-xl font-bold text-[#212529]">Conciliação Bancária</h3>
                  <p className="text-xs font-bold text-[#6c757d] mt-1 uppercase tracking-wider">Resumo do Extrato OFX</p>
                </div>
                <button onClick={onCancel} className="text-[#6c757d] hover:text-[#212529] transition-colors"><Icon name="x" size={24} /></button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                <div className="bg-[#28a745]/10 p-4 rounded-lg border border-[#28a745]/20">
                  <p className="text-[10px] font-bold text-[#28a745] uppercase tracking-wider mb-1">Identificados</p>
                  <p className="text-2xl font-black text-[#28a745]">{data.summary.matched}</p>
                </div>
                <div className="bg-[#005c46]/10 p-4 rounded-lg border border-[#005c46]/20">
                  <p className="text-[10px] font-bold text-[#005c46] uppercase tracking-wider mb-1">Fluxo de Caixa</p>
                  <p className="text-2xl font-black text-[#005c46]">{data.summary.addedToCashflow}</p>
                </div>
                <div className="bg-[#f8f9fa] p-4 rounded-lg border border-[#dee2e6]">
                  <p className="text-[10px] font-bold text-[#6c757d] uppercase tracking-wider mb-1">Duplicados (Ignorados)</p>
                  <p className="text-2xl font-black text-[#212529]">{data.summary.ignored || 0}</p>
                </div>
              </div>
            </div>
            
            <div className="flex-1 overflow-y-auto p-6 space-y-8 sidebar-scroll">
              {data.identified.length > 0 && (
                <div className="space-y-4">
                  <h4 className="text-xs font-bold text-[#6c757d] uppercase tracking-widest flex items-center gap-2">
                    <Icon name="check-circle" size={14} className="text-[#28a745]" /> Boletos Identificados
                  </h4>
                  <div className="overflow-hidden border border-[#dee2e6] rounded-lg">
                    <table className="w-full custom-table text-xs">
                      <thead className="bg-[#f8f9fa]"><tr><th>Data</th><th>Associado</th><th>Boleto</th><th>Valor</th></tr></thead>
                      <tbody>
                        {data.identified.map((item, idx) => (
                          <tr key={idx} className="border-b border-[#dee2e6] last:border-0">
                            <td className="text-[#6c757d]">{item.date}</td>
                            <td className="font-bold text-[#212529]">{item.memberName}</td>
                            <td className="text-[#6c757d]">{item.description}</td>
                            <td className="font-bold text-[#28a745]">R$ {item.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {data.others.length > 0 && (
                <div className="space-y-4">
                  <h4 className="text-xs font-bold text-[#6c757d] uppercase tracking-widest flex items-center gap-2">
                    <Icon name="arrow-left-right" size={14} className="text-[#005c46]" /> Outros Lançamentos (Fluxo de Caixa)
                  </h4>
                  <div className="overflow-hidden border border-[#dee2e6] rounded-lg">
                    <table className="w-full custom-table text-xs">
                      <thead className="bg-[#f8f9fa]"><tr><th>Data</th><th>Descrição / Memo</th><th>Tipo</th><th>Valor</th></tr></thead>
                      <tbody>
                        {data.others.map((item, idx) => (
                          <tr key={idx} className="border-b border-[#dee2e6] last:border-0">
                            <td className="text-[#6c757d]">{item.date}</td>
                            <td className="font-bold text-[#212529]">{item.memo}</td>
                            <td>
                              <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${item.amount > 0 ? 'bg-[#28a745]/10 text-[#28a745]' : 'bg-[#dc3545]/10 text-[#dc3545]'}`}>
                                {item.amount > 0 ? 'ENTRADA' : 'SAIDA'}
                              </span>
                            </td>
                            <td className="font-bold text-[#212529]">R$ {Math.abs(item.amount).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>

            <div className="p-4 bg-[#f8f9fa] border-t border-[#dee2e6] flex gap-3">
              <Button onClick={onCancel} variant="secondary" className="flex-1">Cancelar</Button>
              <Button onClick={onConfirm} className="flex-[2]">
                Confirmar Conciliação
              </Button>
            </div>
          </div>
        </div>
      );
    };

    const Login = ({ onLogin, association }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const res = await run('authenticate', username, password);
          if (res.success) {
            onLogin(res.user);
            return;
          } else {
            setError(res.message);
          }
        } catch (err) {
          setError("Erro ao conectar com o servidor.");
        }
        setLoading(false);
      };

      return (
        <div className="min-h-screen bg-[#f8f9fa] flex items-center justify-center p-4">
          <div className="w-full max-w-md bg-white rounded-xl shadow-xl border border-[#dee2e6] overflow-hidden border-t-8 border-t-[#005c46]">
            <div className="p-10">
              <div className="text-center mb-8">
                {association?.logo ? (
                  <div className="mb-4 flex justify-center">
                    <img src={association.logo} className="w-20 h-20 object-contain rounded-xl shadow-lg" referrerPolicy="no-referrer" />
                  </div>
                ) : (
                  <div className="w-16 h-16 bg-[#005c46] rounded-xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-[#005c46]/20">
                    <Icon name="shield-check" size={32} />
                  </div>
                )}
                <h1 className="text-xl font-bold text-[#212529] uppercase tracking-tight">{association?.name || 'Sistema de Gestão'}</h1>
                <p className="text-xs font-bold text-[#6c757d] uppercase tracking-widest mt-1">Acesso Restrito</p>
              </div>

              <form onSubmit={handleSubmit} className="space-y-5">
                <Input
                  label="Usuário"
                  value={username}
                  onChange={e => setUsername(e.target.value)}
                  placeholder="Seu login"
                  required
                />
                <Input
                  label="Senha"
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  placeholder="••••••••"
                  required
                />

                {error && (
                  <div className="bg-rose-50 text-rose-600 p-3 rounded-lg text-xs font-semibold flex items-center gap-2 border border-rose-100">
                    <Icon name="alert-circle" size={14} />
                    {error}
                  </div>
                )}

                <Button
                  type="submit"
                  disabled={loading}
                  className="w-full py-3.5"
                >
                  {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : "Entrar no Sistema"}
                </Button>
              </form>
            </div>
          </div>
        </div>
      );
    };

    // --- Main App ---
    const GroupedRow = ({ group, selectedIds, setSelectedIds, setIsPrinting, setPaymentConfirm, loadAll, askConfirm, association }) => {
      const [expanded, setExpanded] = React.useState(false);
      return (
        <React.Fragment>
          <tr className="hover:bg-[#f8f9fa] transition-all group cursor-pointer" onClick={() => setExpanded(!expanded)}>
            <td onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-center">
                <Icon name={expanded ? 'chevron-down' : 'chevron-right'} size={16} className="text-[#005c46]" />
              </div>
            </td>
            <td>
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-[#005c46]/10 text-[#005c46] flex items-center justify-center text-xs font-bold">
                  {group.member_name.charAt(0)}
                </div>
                <div>
                  <p className="font-bold text-[#212529]">{group.member_name}</p>
                  <p className="text-[10px] text-[#6c757d] font-bold uppercase tracking-wider">{group.items.length} boleto(s)</p>
                </div>
              </div>
            </td>
            <td className="text-[#6c757d] font-medium">{group.due_date}</td>
            <td className="font-bold text-[#212529]">
              R$ {group.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
            </td>
            <td>
              <span className={`px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider border ${
                group.status === 'PAID' ? 'bg-[#28a745]/10 text-[#28a745] border-[#28a745]/20' : 
                group.status === 'PENDING' ? 'bg-[#f58220]/10 text-[#f58220] border-[#f58220]/20' :
                'bg-[#dee2e6] text-[#6c757d] border-[#dee2e6]'
              }`}>
                {group.status === 'PAID' ? 'PAGO' : group.status === 'PENDING' ? 'PENDENTE' : 'BAIXADO'}
              </span>
            </td>
            <td className="text-right" onClick={(e) => e.stopPropagation()}>
              <div className="flex justify-end gap-1">
                <button onClick={() => {
                  const ids = group.items.map(i => i.id);
                  setSelectedIds(ids);
                  setIsPrinting(true);
                }} className="p-2 text-[#6c757d] hover:text-[#005c46] hover:bg-[#005c46]/10 rounded-lg transition-all" title="Imprimir Todos"><Icon name="printer" size={18} /></button>
              </div>
            </td>
          </tr>
          {expanded && group.items.map(i => (
            <tr key={i.id} className="bg-[#f8f9fa]/50 border-l-4 border-[#f58220]">
              <td className="pl-6">
                <input type="checkbox" className="w-4 h-4 rounded border-[#dee2e6] text-[#005c46] focus:ring-[#005c46]" checked={selectedIds.includes(i.id)} onChange={(e) => {
                  if (e.target.checked) setSelectedIds([...selectedIds, i.id]);
                  else setSelectedIds(selectedIds.filter(id => id !== i.id));
                }} />
              </td>
              <td className="pl-8">
                <p className="text-xs font-bold text-[#212529]">{i.descricao}</p>
                <p className="text-[9px] text-[#6c757d] font-bold uppercase tracking-wider">Parcela {i.installment_number}/{i.total_installments}</p>
              </td>
              <td className="text-xs text-[#6c757d]">{i.due_date}</td>
              <td className="text-xs font-bold text-[#212529]">R$ {i.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
              <td>
                <button 
                  onClick={async () => { 
                    if (i.status === 'BAIXADO') return;
                    if (i.status === 'PENDING') setPaymentConfirm(i);
                    else { await run('updateInstallmentStatus', i.id, 'PENDING'); loadAll(); }
                  }} 
                  className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase border ${
                    i.status === 'PAID' ? 'bg-[#28a745]/10 text-[#28a745] border-[#28a745]/20' : 
                    i.status === 'BAIXADO' ? 'bg-[#dee2e6] text-[#6c757d] border-[#dee2e6] cursor-not-allowed' :
                    'bg-[#f58220]/10 text-[#f58220] border-[#f58220]/20'
                  }`}
                >
                  {i.status === 'PAID' ? 'PAGO' : i.status === 'BAIXADO' ? 'BAIXADO' : 'PENDENTE'}
                </button>
              </td>
              <td className="text-right">
                <div className="flex justify-end gap-1">
                  <button onClick={() => {
                    const pixPayload = generatePixPayload({ pixKey: association.pix_key, merchantName: association.name, merchantCity: association.city || 'SAO PAULO', amount: i.valor, description: i.id });
                    const text = `Olá *${i.member_name}*, segue o seu boleto da *${association.name}*.\n\n💰 *Valor:* R$ ${i.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}\n📅 *Vencimento:* ${i.due_date}\n\n🔗 *PIX Copia e Cola:*\n${pixPayload}`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
                  }} className="p-1.5 text-[#28a745] hover:bg-[#28a745]/10 rounded transition-all"><Icon name="message-circle" size={14} /></button>
                  <button onClick={() => { setSelectedIds([i.id]); setIsPrinting(true); }} className="p-1.5 text-[#6c757d] hover:text-[#005c46] rounded transition-all"><Icon name="printer" size={14} /></button>
                  <button onClick={() => askConfirm("Excluir", "Excluir esta parcela?", async () => { await run('deleteInstallment', i.id); loadAll(); setConfirm(null); })} className="p-1.5 text-[#6c757d] hover:text-[#dc3545] rounded transition-all"><Icon name="trash-2" size={14} /></button>
                </div>
              </td>
            </tr>
          ))}
        </React.Fragment>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [genMode, setGenMode] = useState('package'); // 'package' or 'custom'
      const [bulkGen, setBulkGen] = useState(true);
      const [members, setMembers] = useState([]);
      const [installments, setInstallments] = useState([]);
      const [cashflow, setCashflow] = useState([]);
      const [users, setUsers] = useState([]);
      const [closedMonths, setClosedMonths] = useState([]);
      const [association, setAssociation] = useState({ name: '', cnpj: '', pix_key: '', logo: '', city: 'SAO PAULO' });
      const [loading, setLoading] = useState(true);
      const [currentUser, setCurrentUser] = useState(null);
      const [selectedIds, setSelectedIds] = useState([]);
      const [isPrinting, setIsPrinting] = useState(false);
      const [printMode, setPrintMode] = useState('3perPage'); // '3perPage' or '1perPage'
      const [reportPreview, setReportPreview] = useState(null);
      const [reconciliationResults, setReconciliationResults] = useState(null);
      const [paymentConfirm, setPaymentConfirm] = useState(null);
      const [managementFilter, setManagementFilter] = useState('active'); // 'active' or 'history'
      const [toast, setToast] = useState(null);
      const [confirm, setConfirm] = useState(null);
      const [showMemberModal, setShowMemberModal] = useState(false);
      const [showUserModal, setShowUserModal] = useState(false);
      const [editingMember, setEditingMember] = useState(null);
      const [editingUser, setEditingUser] = useState(null);
      const [selectedCashFlowIds, setSelectedCashFlowIds] = useState([]);
      const [showMobileMenu, setShowMobileMenu] = useState(false);
      const [cashFlowView, setCashFlowView] = useState('open'); // 'open' | 'all'

      const handleFileUpload = async (e, id) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // Verificar tamanho do arquivo (limite GAS é ~10MB, mas recomendamos menos)
        if (file.size > 8 * 1024 * 1024) {
          showToast("Arquivo muito grande. Limite de 8MB.", "error");
          return;
        }

        setLoading(true);
        try {
          const base64Data = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (ev) => resolve(ev.target.result);
            reader.onerror = (err) => reject(err);
            reader.readAsDataURL(file);
          });
          
          const res = await run('uploadFileToDrive', base64Data, file.name);
          if (res && res.url) {
            await run('updateCashFlowAttachment', id, res.url);
            showToast("Comprovante anexado com sucesso!");
            loadAll();
          } else {
            throw new Error("Resposta inválida do servidor.");
          }
        } catch (err) {
          console.error("Erro no upload:", err);
          showToast("Erro ao anexar comprovante: " + (err.message || "Erro desconhecido"), "error");
        }
        setLoading(false);
      };

      const handlePrintMonth = async (mes, entries, totalE, totalS, saldoAnterior = 0) => {
        setLoading(true);
        try {
          const urls = entries.filter(e => e.anexo).map(e => e.anexo);
          let attachments = [];
          
          if (urls.length > 0) {
            attachments = await run('getAttachmentsBase64', urls);
          }

          const printDiv = document.createElement('div');
          printDiv.style.backgroundColor = 'white';
          printDiv.style.fontFamily = 'Inter, sans-serif';
          
          const headerHtml = `
            <div style="padding: 40px; border-bottom: 2px solid #000; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
              <div style="display: flex; align-items: center; gap: 20px;">
                ${association.logo ? `<img src="${association.logo}" style="width: 60px; height: 60px; object-fit: contain;" referrerPolicy="no-referrer" />` : ''}
                <div>
                  <h1 style="margin: 0; font-size: 24px; font-weight: 900; text-transform: uppercase;">Relatório de Fluxo de Caixa</h1>
                  <p style="margin: 5px 0 0 0; font-size: 14px; color: #666; font-weight: 700;">${association.name} - CNPJ: ${association.cnpj}</p>
                </div>
              </div>
              <div style="text-align: right;">
                <p style="margin: 0; font-size: 12px; font-weight: 900; text-transform: uppercase; color: #999;">Mês de Referência</p>
                <p style="margin: 0; font-size: 18px; font-weight: 900;">${mes}</p>
              </div>
            </div>
          `;
          
          const tableHtml = `
            <div style="padding: 0 40px 40px 40px;">
              <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                <thead>
                  <tr style="background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                    <th style="padding: 10px; text-align: left; text-transform: uppercase; color: #64748b; width: 80px;">Data</th>
                    <th style="padding: 10px; text-align: left; text-transform: uppercase; color: #64748b;">Descrição</th>
                    <th style="padding: 10px; text-align: right; text-transform: uppercase; color: #ef4444; width: 100px;">Saídas (-)</th>
                    <th style="padding: 10px; text-align: right; text-transform: uppercase; color: #10b981; width: 100px;">Entradas (+)</th>
                  </tr>
                </thead>
                <tbody>
                  ${entries.sort((a,b) => {
                    const [da, ma, ya] = a.data.split('/').map(Number);
                    const [db, mb, yb] = b.data.split('/').map(Number);
                    return new Date(ya, ma - 1, da) - new Date(yb, mb - 1, db);
                  }).map(e => `
                    <tr style="border-bottom: 1px solid #f1f5f9;">
                      <td style="padding: 8px 10px; color: #64748b;">${e.data}</td>
                      <td style="padding: 8px 10px; font-weight: 600; color: #1e293b;">${e.descricao}</td>
                      <td style="padding: 8px 10px; text-align: right; font-weight: 700; color: #ef4444;">
                        ${e.tipo === 'SAIDA' ? `R$ ${Number(e.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` : '-'}
                      </td>
                      <td style="padding: 8px 10px; text-align: right; font-weight: 700; color: #10b981;">
                        ${e.tipo === 'ENTRADA' ? `R$ ${Number(e.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` : '-'}
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
                <tfoot>
                  <tr style="background-color: #f8fafc; font-weight: 700; border-top: 2px solid #e2e8f0;">
                    <td colspan="2" style="padding: 10px; text-align: right; text-transform: uppercase;">Totais do Período:</td>
                    <td style="padding: 10px; text-align: right; color: #ef4444;">R$ ${totalS.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                    <td style="padding: 10px; text-align: right; color: #10b981;">R$ ${totalE.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                  </tr>
                  <tr style="background-color: #f8fafc; font-weight: 700;">
                    <td colspan="3" style="padding: 10px; text-align: right; text-transform: uppercase;">Saldo Anterior:</td>
                    <td style="padding: 10px; text-align: right; font-size: 12px; color: #1e293b;">R$ ${saldoAnterior.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                  </tr>
                  <tr style="background-color: #f8fafc; font-weight: 700;">
                    <td colspan="3" style="padding: 10px; text-align: right; text-transform: uppercase;">Movimentação Líquida:</td>
                    <td style="padding: 10px; text-align: right; font-size: 12px; color: ${totalE - totalS >= 0 ? '#059669' : '#dc2626'};">R$ ${(totalE - totalS).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                  </tr>
                  <tr style="background-color: #f1f5f9; font-weight: 900;">
                    <td colspan="3" style="padding: 15px; text-align: right; text-transform: uppercase; font-size: 14px;">Saldo Final Disponível:</td>
                    <td style="padding: 15px; text-align: right; font-size: 16px; color: ${saldoAnterior + (totalE - totalS) >= 0 ? '#059669' : '#dc2626'};">R$ ${(saldoAnterior + (totalE - totalS)).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          `;
          
          let contentHtml = headerHtml + tableHtml;

          // Adicionar anexos (cada um em uma nova página)
          attachments.forEach((att, index) => {
            contentHtml += `
              <div style="page-break-before: always; padding: 40px; text-align: center; background-color: white;">
                <div style="border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
                  <h2 style="margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase; color: #005c46;">Comprovante de Lançamento</h2>
                  <p style="margin: 0; font-size: 12px; font-weight: 700; color: #666;">${index + 1} / ${attachments.length}</p>
                </div>
                <p style="text-align: left; font-size: 12px; font-weight: 700; color: #212529; margin-bottom: 20px; background: #f8f9fa; padding: 10px; border-radius: 5px;">
                  Arquivo: <span style="font-weight: 400; color: #666;">${att.name}</span>
                </p>
                <div style="display: flex; justify-content: center; align-items: center; min-height: 200mm; border: 1px dashed #ccc; border-radius: 10px; padding: 10px; background: #fafafa;">
                  <img src="${att.base64}" style="max-width: 100%; max-height: 180mm; object-fit: contain; box-shadow: 0 10px 25px rgba(0,0,0,0.1);" />
                </div>
              </div>
            `;
          });

          printDiv.innerHTML = contentHtml;
          
          const opt = { 
            margin: 0, 
            filename: `fechamento_${mes.replace('/','_')}.pdf`, 
            image: { type: 'jpeg', quality: 0.98 }, 
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
          };
          
          await html2pdf().set(opt).from(printDiv).save();
          showToast("Relatório gerado com sucesso!");
        } catch (err) {
          console.error("Erro ao gerar relatório:", err);
          showToast("Erro ao gerar relatório com anexos.", "error");
        }
        setLoading(false);
      };

      const handlePrintSelectedCashFlow = async () => {
        if (selectedCashFlowIds.length === 0) {
          showToast("Selecione ao menos um lançamento.", "error");
          return;
        }

        setLoading(true);
        try {
          const selectedEntries = cashflow.filter(i => selectedCashFlowIds.includes(i.id));
          const totalE = selectedEntries.filter(e => e.tipo === 'ENTRADA').reduce((acc, curr) => acc + Number(curr.valor), 0);
          const totalS = selectedEntries.filter(e => e.tipo === 'SAIDA').reduce((acc, curr) => acc + Number(curr.valor), 0);

          const printDiv = document.createElement('div');
          printDiv.style.backgroundColor = 'white';
          printDiv.style.fontFamily = 'Inter, sans-serif';
          
          const headerHtml = `
            <div style="padding: 40px; border-bottom: 2px solid #000; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
              <div style="display: flex; align-items: center; gap: 20px;">
                ${association.logo ? `<img src="${association.logo}" style="width: 60px; height: 60px; object-fit: contain;" referrerPolicy="no-referrer" />` : ''}
                <div>
                  <h1 style="margin: 0; font-size: 24px; font-weight: 900; text-transform: uppercase;">Resumo Balanço Parcial</h1>
                  <p style="margin: 5px 0 0 0; font-size: 14px; color: #666; font-weight: 700;">${association.name} - CNPJ: ${association.cnpj}</p>
                </div>
              </div>
              <div style="text-align: right;">
                <p style="margin: 0; font-size: 12px; font-weight: 900; text-transform: uppercase; color: #999;">Emissão</p>
                <p style="margin: 0; font-size: 14px; font-weight: 900;">${new Date().toLocaleDateString('pt-BR')}</p>
              </div>
            </div>
          `;
          
          const tableHtml = `
            <div style="padding: 0 40px 40px 40px;">
              <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                <thead>
                  <tr style="background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                    <th style="padding: 10px; text-align: left; text-transform: uppercase; color: #64748b; width: 80px;">Data</th>
                    <th style="padding: 10px; text-align: left; text-transform: uppercase; color: #64748b;">Descrição</th>
                    <th style="padding: 10px; text-align: right; text-transform: uppercase; color: #ef4444; width: 100px;">Débito (-)</th>
                    <th style="padding: 10px; text-align: right; text-transform: uppercase; color: #10b981; width: 100px;">Crédito (+)</th>
                  </tr>
                </thead>
                <tbody>
                  ${selectedEntries.sort((a,b) => {
                    const [da, ma, ya] = a.data.split('/').map(Number);
                    const [db, mb, yb] = b.data.split('/').map(Number);
                    return new Date(ya, ma - 1, da) - new Date(yb, mb - 1, db);
                  }).map(e => `
                    <tr style="border-bottom: 1px solid #f1f5f9;">
                      <td style="padding: 8px 10px; color: #64748b;">${e.data}</td>
                      <td style="padding: 8px 10px; font-weight: 600; color: #1e293b;">${e.descricao}</td>
                      <td style="padding: 8px 10px; text-align: right; font-weight: 700; color: #ef4444;">
                        ${e.tipo === 'SAIDA' ? `R$ ${Number(e.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` : '-'}
                      </td>
                      <td style="padding: 8px 10px; text-align: right; font-weight: 700; color: #10b981;">
                        ${e.tipo === 'ENTRADA' ? `R$ ${Number(e.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` : '-'}
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
                <tfoot>
                  <tr style="background-color: #f8fafc; font-weight: 700; border-top: 2px solid #e2e8f0;">
                    <td colspan="2" style="padding: 10px; text-align: right; text-transform: uppercase;">Totais Selecionados:</td>
                    <td style="padding: 10px; text-align: right; color: #ef4444;">R$ ${totalS.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                    <td style="padding: 10px; text-align: right; color: #10b981;">R$ ${totalE.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                  </tr>
                  <tr style="background-color: #f1f5f9; font-weight: 900;">
                    <td colspan="3" style="padding: 15px; text-align: right; text-transform: uppercase; font-size: 14px;">Balanço Liquido Selecionado:</td>
                    <td style="padding: 15px; text-align: right; font-size: 16px; color: ${totalE - totalS >= 0 ? '#059669' : '#dc2626'};">R$ ${(totalE - totalS).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          `;
          
          printDiv.innerHTML = headerHtml + tableHtml;
          
          const opt = { 
            margin: 10, 
            filename: `resumo_caixa_${new Date().getTime()}.pdf`, 
            image: { type: 'jpeg', quality: 0.98 }, 
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
          };
          
          await html2pdf().set(opt).from(printDiv).save();
          showToast("Resumo gerado com sucesso!");
        } catch (err) {
          console.error("Erro ao gerar resumo:", err);
          showToast("Erro ao gerar resumo financeiro.", "error");
        }
        setLoading(false);
      };

      const showToast = (message, type = 'success') => setToast({ message, type });
      const askConfirm = (title, message, onConfirm) => setConfirm({ title, message, onConfirm });

      const handleOFXUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        setLoading(true);
        try {
          const content = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (ev) => resolve(ev.target.result);
            reader.readAsText(file);
          });
          
          const results = await run('processOFX', content);
          setReconciliationResults(results);
        } catch (err) {
          showToast("Erro ao processar arquivo OFX", "error");
        }
        setLoading(false);
        e.target.value = ''; // Reset input
      };

      const loadAll = async () => {
        setLoading(true);
        try {
          // Carrega associação primeiro (pode ser necessário para o Login)
          const assoc = await run('getAssociation');
          setAssociation(assoc || { name: '', cnpj: '', pix_key: '', logo: '', city: 'SAO PAULO' });

          if (currentUser) {
            const [m, i, cf, u, cm] = await Promise.all([
              run('getMembers'), 
              run('getInstallments'), 
              run('getCashFlow'),
              run('getUsers'),
              run('getClosedMonths')
            ]);
            setMembers(m || []);
            setInstallments(i || []);
            setCashflow(cf || []);
            setUsers(u || []);
            setClosedMonths(cm || []);
          }
        } catch (e) { console.error("Erro ao carregar dados:", e); }
        setLoading(false);
      };

      useEffect(() => { loadAll(); }, [currentUser]);

      if (!currentUser) return <Login onLogin={setCurrentUser} association={association} />;

      if (loading) return (
        <div className="flex flex-col items-center justify-center h-screen bg-white">
          <div className="w-10 h-10 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Carregando Sistema...</p>
        </div>
      );

      if (isPrinting) {
        const selectedInstallments = installments.filter(i => selectedIds.includes(i.id));
        
        // Chunk installments for 3 per page mode
        const chunked = [];
        if (printMode === '3perPage') {
          for (let i = 0; i < selectedInstallments.length; i += 3) {
            chunked.push(selectedInstallments.slice(i, i + 3));
          }
        } else {
          selectedInstallments.forEach(inst => chunked.push([inst]));
        }

        const handleDownloadPDF = () => {
          const element = document.getElementById('print-content');
          const opt = { 
            margin: 10, 
            filename: `boletos_${new Date().getTime()}.pdf`, 
            image: { type: 'jpeg', quality: 0.98 }, 
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
          };
          html2pdf().set(opt).from(element).save();
        };

        return (
          <div className="p-4 md:p-8 bg-slate-50 min-h-screen">
            <div className="max-w-4xl mx-auto mb-8 no-print flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 md:p-6 rounded-2xl border border-slate-200 shadow-sm">
              <div>
                <h2 className="text-xl font-black text-slate-800">Configurações de Impressão</h2>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Total de {selectedInstallments.length} boletos selecionados</p>
              </div>
              <div className="flex items-center gap-2 md:gap-3 flex-wrap w-full md:w-auto">
                <div className="flex p-1 bg-slate-100 rounded-xl">
                  <button onClick={() => setPrintMode('3perPage')} className={`px-3 md:px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all ${printMode === '3perPage' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>3 por página</button>
                  <button onClick={() => setPrintMode('1perPage')} className={`px-3 md:px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all ${printMode === '1perPage' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>1 por página</button>
                </div>
                <button onClick={() => window.print()} className="bg-yellow-400 text-slate-900 px-4 md:px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-yellow-500 transition-all shadow-lg shadow-yellow-100">
                  <Icon name="printer" size={18} /> Imprimir
                </button>
                <button onClick={handleDownloadPDF} className="bg-slate-900 text-white px-4 md:px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">
                  <Icon name="file-text" size={18} /> PDF
                </button>
                <button onClick={() => { setIsPrinting(false); setSelectedIds([]); }} className="bg-slate-100 text-slate-600 px-4 md:px-6 py-2.5 rounded-xl font-bold hover:bg-slate-200 transition-all">Voltar</button>
              </div>
            </div>

            <div id="print-content" className="max-w-4xl mx-auto">
              {chunked.map((page, pageIdx) => (
                <div key={pageIdx} className={`space-y-8 ${pageIdx < chunked.length - 1 ? 'page-break mb-12' : ''}`}>
                  {page.map((inst, instIdx) => {
                    const pixPayload = generatePixPayload({ pixKey: association.pix_key, merchantName: association.name, merchantCity: association.city || 'SAO PAULO', amount: inst.valor, description: inst.id });
                    return (
                      <div key={inst.id}>
                        {instIdx > 0 && <div className="print-separator"></div>}
                        <div className="bg-white border-2 border-slate-300 p-4 rounded-xl print-area relative">
                          <div className="flex justify-between border-b-2 border-slate-900 pb-2 mb-4">
                          <div className="flex items-center gap-3">
                            {association.logo && <img src={association.logo} className="h-10 w-10 object-contain" />}
                            <div>
                              <h1 className="text-lg font-black uppercase leading-tight">{association.name || "Associação"}</h1>
                              <p className="text-[10px] font-bold text-slate-500">CNPJ: {association.cnpj || "00.000.000/0000-00"}</p>
                            </div>
                          </div>
                          <div className="text-right">
                            <p className="text-xl font-black">R$ {Number(inst.valor || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div className="space-y-3">
                            <div><label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Pagador</label><p className="font-bold text-base">{inst.member_name}</p></div>
                            <div className="grid grid-cols-2 gap-3">
                              <div><label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Vencimento</label><p className="font-bold text-sm">{inst.due_date}</p></div>
                              <div><label className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Referência</label><p className="font-bold text-sm">{inst.installment_number}/{inst.total_installments}</p></div>
                            </div>
                            <div><p className="text-[10px] text-slate-500 italic">{inst.descricao}</p></div>
                          </div>
                          <div className="flex flex-col items-center border-l border-slate-100 pl-4">
                            <p className="text-[9px] font-bold uppercase text-slate-400 mb-1">Pague com PIX</p>
                            {pixPayload ? <PixQRCode value={pixPayload} /> : <p className="text-xs text-red-500 font-bold">Chave PIX Ausente</p>}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
                </div>
              ))}
            </div>
          </div>
        );
      }

      const menuItems = [
        { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
        { id: 'members', label: 'Associados', icon: 'users' },
        { id: 'generate', label: 'Gerar Cobrança', icon: 'plus-circle' },
        { id: 'management', label: 'Gestão Financeira', icon: 'banknote' },
        { id: 'cashflow', label: 'Fluxo de Caixa', icon: 'arrow-left-right' },
        { id: 'reports', label: 'Relatórios', icon: 'file-bar-chart' },
        { id: 'settings', label: 'Configurações', icon: 'settings' },
      ];

      const totalEntradas = cashflow.filter(i => i.tipo === 'ENTRADA' && i.status === 'ABERTO').reduce((acc, curr) => acc + Number(curr.valor), 0);
      const totalSaidas = cashflow.filter(i => i.tipo === 'SAIDA' && i.status === 'ABERTO').reduce((acc, curr) => acc + Number(curr.valor), 0);
      const saldoAtual = cashflow.reduce((acc, curr) => {
        const val = Number(curr.valor) || 0;
        return curr.tipo === 'ENTRADA' ? acc + val : acc - val;
      }, 0);
      const contasAPagar = installments.filter(i => i.status === 'PENDING').reduce((acc, curr) => acc + curr.valor, 0);

      return (
        <div className="flex h-screen overflow-hidden bg-[#f8f9fa]">
          {/* Mobile Drawer (menu completo pelo celular) */}
          {showMobileMenu && (
            <div className="md:hidden fixed inset-0 z-50 no-print">
              <div className="absolute inset-0 bg-black/50" onClick={() => setShowMobileMenu(false)} />
              <aside className="absolute left-0 top-0 bottom-0 w-72 max-w-[85%] bg-[#005c46] flex flex-col shadow-2xl animate-toast">
                <div className="p-5 border-b border-[#004a38] flex items-center justify-between">
                  <div className="flex items-center gap-3 overflow-hidden">
                    {association.logo ? (
                      <img src={association.logo} className="w-10 h-10 object-contain rounded-lg bg-white p-1 flex-shrink-0" referrerPolicy="no-referrer" />
                    ) : (
                      <div className="w-10 h-10 bg-[#f58220] rounded-lg flex items-center justify-center text-white flex-shrink-0">
                        <Icon name="shield" size={22} />
                      </div>
                    )}
                    <div className="overflow-hidden">
                      <h1 className="font-bold text-white text-sm leading-tight uppercase tracking-tight truncate">{association.name || 'SISTEMA'}</h1>
                      <p className="text-[10px] font-bold text-[#f58220] uppercase tracking-wider">Menu</p>
                    </div>
                  </div>
                  <button onClick={() => setShowMobileMenu(false)} className="text-white/70 hover:text-white p-1 flex-shrink-0" aria-label="Fechar menu">
                    <Icon name="x" size={22} />
                  </button>
                </div>
                <nav className="flex-1 p-4 space-y-1 overflow-y-auto sidebar-scroll">
                  {menuItems.map(item => (
                    <button
                      key={item.id}
                      onClick={() => { setActiveTab(item.id); setReportPreview(null); setShowMobileMenu(false); }}
                      className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all ${
                        activeTab === item.id
                          ? 'bg-[#f58220] text-white shadow-lg shadow-[#f58220]/20'
                          : 'text-white/80 hover:bg-[#004a38] hover:text-white'
                      }`}
                    >
                      <Icon name={item.icon} size={18} />
                      {item.label}
                    </button>
                  ))}
                </nav>
                <div className="p-4 border-t border-[#004a38]">
                  <div className="bg-[#004a38]/50 p-3 rounded-xl border border-[#004a38]">
                    <div className="flex items-center gap-3 mb-3">
                      <div className="w-8 h-8 rounded-full bg-[#f58220] flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
                        {currentUser.name.charAt(0)}
                      </div>
                      <div className="overflow-hidden">
                        <p className="text-xs font-bold text-white truncate">{currentUser.name}</p>
                        <p className="text-[10px] text-[#f58220] uppercase font-bold">{currentUser.role}</p>
                      </div>
                    </div>
                    <button
                      onClick={() => { setShowMobileMenu(false); setCurrentUser(null); }}
                      className="w-full flex items-center justify-center gap-2 py-2 text-[10px] font-bold uppercase tracking-widest bg-[#dc3545]/10 text-[#dc3545] hover:bg-[#dc3545]/20 rounded-lg transition-all"
                    >
                      <Icon name="log-out" size={14} /> Sair do Sistema
                    </button>
                  </div>
                </div>
              </aside>
            </div>
          )}

          {/* Sidebar */}
          <aside className="w-64 bg-[#005c46] flex-shrink-0 hidden md:flex flex-col no-print z-30 shadow-2xl">
            <div className="p-6 border-b border-[#004a38]">
              <div className="flex items-center gap-3">
                {association.logo ? (
                  <img src={association.logo} className="w-10 h-10 object-contain rounded-lg bg-white p-1" referrerPolicy="no-referrer" />
                ) : (
                  <div className="w-10 h-10 bg-[#f58220] rounded-lg flex items-center justify-center text-white shadow-lg shadow-[#f58220]/20">
                    <Icon name="shield" size={24} />
                  </div>
                )}
                <div className="overflow-hidden">
                  <h1 className="font-bold text-white text-sm leading-tight uppercase tracking-tight truncate">{association.name || 'SISTEMA'}</h1>
                  <p className="text-[10px] font-bold text-[#f58220] uppercase tracking-wider">Painel Administrativo</p>
                </div>
              </div>
            </div>
            
            <nav className="flex-1 p-4 space-y-1 overflow-y-auto sidebar-scroll">
              {menuItems.map(item => (
                <button
                  key={item.id}
                  onClick={() => { setActiveTab(item.id); setReportPreview(null); }}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all ${
                    activeTab === item.id 
                      ? 'bg-[#f58220] text-white shadow-lg shadow-[#f58220]/20' 
                      : 'text-white/70 hover:bg-[#004a38] hover:text-white'
                  }`}
                >
                  <Icon name={item.icon} size={18} />
                  {item.label}
                </button>
              ))}
            </nav>

            <div className="p-4 border-t border-[#004a38]">
              <div className="bg-[#004a38]/50 p-4 rounded-xl border border-[#004a38]">
                <div className="flex items-center gap-3 mb-3">
                  <div className="w-8 h-8 rounded-full bg-[#f58220] flex items-center justify-center text-white text-xs font-bold">
                    {currentUser.name.charAt(0)}
                  </div>
                  <div className="overflow-hidden">
                    <p className="text-xs font-bold text-white truncate">{currentUser.name}</p>
                    <p className="text-[10px] text-[#f58220] uppercase font-bold">{currentUser.role}</p>
                  </div>
                </div>
                <button 
                  onClick={() => setCurrentUser(null)}
                  className="w-full flex items-center justify-center gap-2 py-2 text-[10px] font-bold uppercase tracking-widest bg-[#dc3545]/10 text-[#dc3545] hover:bg-[#dc3545]/20 rounded-lg transition-all"
                >
                  <Icon name="log-out" size={14} /> Sair do Sistema
                </button>
              </div>
            </div>
          </aside>

          {/* Mobile Nav */}
          <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-[#dee2e6] flex justify-around p-2 z-40 no-print">
            {menuItems.slice(0, 4).map(item => (
              <button
                key={item.id}
                onClick={() => { setActiveTab(item.id); setReportPreview(null); }}
                className={`flex flex-col items-center gap-1 p-2 rounded-lg transition-all ${
                  activeTab === item.id ? 'text-[#005c46] bg-[#005c46]/10' : 'text-[#6c757d]'
                }`}
              >
                <Icon name={item.icon} size={20} />
                <span className="text-[9px] font-bold uppercase tracking-tighter">{item.label.split(' ')[0]}</span>
              </button>
            ))}
            <button
              onClick={() => setShowMobileMenu(true)}
              className="flex flex-col items-center gap-1 p-2 rounded-lg transition-all text-[#6c757d]"
              aria-label="Mais opções"
            >
              <Icon name="menu" size={20} />
              <span className="text-[9px] font-bold uppercase tracking-tighter">Mais</span>
            </button>
          </div>

          {/* Main Content */}
          <main className="flex-1 overflow-y-auto no-scrollbar relative pb-20 md:pb-0">
            <header className="h-16 bg-white/80 backdrop-blur-md border-b border-[#dee2e6] flex items-center justify-between px-6 sticky top-0 z-20 no-print">
              <div className="flex items-center gap-4">
                <button onClick={() => setShowMobileMenu(true)} className="md:hidden text-[#6c757d] p-2 -ml-2 hover:bg-[#f8f9fa] rounded-lg transition-all" aria-label="Abrir menu"><Icon name="menu" size={24} /></button>
                <h2 className="text-base font-bold text-[#212529] uppercase tracking-tight">
                  {menuItems.find(m => m.id === activeTab)?.label}
                </h2>
              </div>
              <div className="flex items-center gap-3">
                <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-[#f8f9fa] rounded-full border border-[#dee2e6]">
                  <div className="w-2 h-2 rounded-full bg-[#28a745] animate-pulse"></div>
                  <span className="text-[10px] font-bold text-[#6c757d] uppercase tracking-wider">Sistema Online</span>
                </div>
                <button onClick={loadAll} className="p-2 text-[#6c757d] hover:text-[#005c46] transition-all rounded-lg hover:bg-[#f8f9fa]" title="Sincronizar Dados">
                  <Icon name="refresh-cw" size={18} className={loading ? 'animate-spin' : ''} />
                </button>
              </div>
            </header>

            <div className="p-6 max-w-7xl mx-auto space-y-6">
              {/* Top Financial Cards */}
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 no-print">
                <StatCard title="Saldo em Caixa" value={`R$ ${saldoAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`} icon="wallet" color="blue" />
                <StatCard title="Entradas do Mês" value={`R$ ${totalEntradas.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`} icon="trending-up" color="green" />
                <StatCard title="Saídas do Mês" value={`R$ ${totalSaidas.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`} icon="trending-down" color="red" />
                <StatCard title="Contas a Receber" value={`R$ ${contasAPagar.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`} icon="clock" color="orange" />
              </div>

              {activeTab === 'dashboard' && (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  <div className="lg:col-span-2 space-y-6">
                    <Card title="Fluxo de Caixa Recente" subtitle="Últimas movimentações registradas">
                      <div className="space-y-3">
                        {cashflow.slice(0, 6).map(i => (
                          <div key={i.id} className="flex items-center justify-between p-3 rounded-lg border border-[#dee2e6] hover:bg-[#f8f9fa] transition-all group">
                            <div className="flex items-center gap-3">
                              <div className={`p-2 rounded-lg ${i.tipo === 'ENTRADA' ? 'bg-[#28a745]/10 text-[#28a745]' : 'bg-[#dc3545]/10 text-[#dc3545]'}`}>
                                <Icon name={i.tipo === 'ENTRADA' ? 'arrow-up-right' : 'arrow-down-right'} size={16} />
                              </div>
                              <div>
                                <p className="text-sm font-bold text-[#212529]">{i.descricao}</p>
                                <p className="text-[10px] text-[#6c757d] font-bold uppercase tracking-wider">{i.data}</p>
                              </div>
                            </div>
                            <p className={`text-sm font-bold ${i.tipo === 'ENTRADA' ? 'text-[#28a745]' : 'text-[#dc3545]'}`}>
                              {i.tipo === 'ENTRADA' ? '+' : '-'} R$ {Number(i.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                            </p>
                          </div>
                        ))}
                        {cashflow.length === 0 && (
                          <div className="text-center py-12">
                            <div className="w-12 h-12 bg-[#f8f9fa] rounded-full flex items-center justify-center mx-auto mb-3 text-[#dee2e6]">
                              <Icon name="inbox" size={24} />
                            </div>
                            <p className="text-sm text-[#6c757d] font-medium">Nenhum lançamento encontrado.</p>
                          </div>
                        )}
                      </div>
                    </Card>
                  </div>
                  <div className="space-y-6">
                    <Card title="Ações Rápidas">
                      <div className="grid grid-cols-1 gap-2">
                        <Button onClick={() => setActiveTab('generate')} icon="plus" className="w-full justify-start">Gerar Cobrança</Button>
                        <Button onClick={() => setActiveTab('members')} variant="secondary" icon="user-plus" className="w-full justify-start">Novo Associado</Button>
                        <Button onClick={() => setActiveTab('reports')} variant="secondary" icon="file-text" className="w-full justify-start">Ver Relatórios</Button>
                      </div>
                    </Card>
                    <Card title="Resumo Associados">
                      <div className="text-center py-6">
                        <p className="text-4xl font-bold text-[#005c46]">{members.length}</p>
                        <p className="text-[10px] font-bold text-[#6c757d] uppercase tracking-widest mt-2">Membros Ativos</p>
                      </div>
                    </Card>
                  </div>
                </div>
              )}

              {activeTab === 'members' && (
                <Card 
                  title="Gestão de Associados" 
                  subtitle="Controle de membros da associação" 
                  action={
                    <Button onClick={() => { setEditingMember(null); setShowMemberModal(true); }} icon="plus" className="py-2">Novo Membro</Button>
                  }
                >
                  <div className="overflow-x-auto -mx-5">
                    <table className="w-full custom-table">
                      <thead>
                        <tr>
                          <th>Nome</th>
                          <th>CPF</th>
                          <th className="text-right">Ações</th>
                        </tr>
                      </thead>
                      <tbody>

                      e.preventDefault();

                          await run('generateStandardPackage', { 
                            bulk: bulkGen,
                            member_id: d.get('member'),
                            total_amount: d.get('amount'),
                            discount_amount: d.get('discount'),
                            first_due_date: d.get('date'),
                            second_due_date: d.get('date2'),
                            description: d.get('desc')
                          });
                        } else {
                          await run('generateInstallments', { 
                            member_id: d.get('member'), 
                            total_amount: d.get('amount'), 
                            num_installments: d.get('installments'), 
                            first_due_date: d.get('date'), 
                            description: d.get('desc') 
                          });
                        }
                        showToast("Cobranças geradas com sucesso!"); 
                        loadAll(); 
                        setActiveTab('management');
