                        showToast("Erro ao gerar cobranças.", "error");
                      }
                      setLoading(false);
                    }}>
                      {genMode === 'package' && (
                        <div className="flex items-center gap-3 p-4 bg-[#005c46]/5 rounded-xl border border-[#005c46]/10 mb-2">

                        <Select label="Associado" name="member" required>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                          <Input label="Valor do Desconto (R$)" name="discount" type="number" step="0.01" placeholder="0,00" required />
                        ) : (
                          <Input label="Número de Parcelas" name="installments" type="number" placeholder="1" required />
                        )}
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <Input label={genMode === 'package' ? 'Vencimento (À Vista e 1ª Parcela)' : 'Data do Primeiro Vencimento'} name="date" type="date" required />
                        {genMode === 'package' && (
                          <Input label="Vencimento (2ª Parcela)" name="date2" type="date" required />
                        )}
                      </div>
                      
                      <Input label="Descrição do Lançamento" name="desc" type="text" placeholder="Ex: Anuidade 2024" defaultValue="Anuidade" />

                      <Button type="submit" className="w-full py-4 mt-2" icon="check-circle">
                        {bulkGen && genMode === 'package' ? "Gerar para Todos" : "Gerar Cobranças"}
                      </Button>
                    </form>
                  </Card>
                </div>
              )}

                <div className="space-y-6">

                          managementFilter === 'active' ? 'bg-white text-[#005c46] shadow-sm' : 'text-[#6c757d] hover:text-[#212529]'

                      >
                        Cobranças Ativas

                      <button

                    else setSelectedIds([]);

                <th>Associado</th>
                <th>Vencimento</th>

                <th>Status</th>
                <th className="text-right">Ações</th>
              </tr>

                const memberMap = new Map();

                const filteredInstallments = installments.filter(i => {
                  if (managementFilter === 'active') {
                    return i.status === 'PENDING';
                  } else {
                    return i.status === 'PAID' || i.status === 'BAIXADO';
                  }
                });

                filteredInstallments.forEach(inst => {
                  if (!memberMap.has(inst.memberid)) {
                    memberMap.set(inst.memberid, {
                      id: `member-${inst.memberid}`,
                      member_name: inst.member_name,
                      items: [],
                      valor: 0,
                      due_date: inst.due_date,
                      status: inst.status
                    });
                  }
                  const group = memberMap.get(inst.memberid);
                  group.items.push(inst);
                  group.valor += inst.valor;
                  
                  // Manter o vencimento mais próximo para o grupo
                  if (inst.due_date < group.due_date) {
                    group.due_date = inst.due_date;
                  }
                });

                memberMap.forEach(group => {
                  // Ordenar itens do grupo por vencimento
                  group.items.sort((a, b) => a.due_date.localeCompare(b.due_date));
                  groups.push(group);
                });

                // Ordenar grupos por nome do associado
                groups.sort((a, b) => a.member_name.localeCompare(b.member_name));

                return groups.map(group => (

                    group={group} 
                    selectedIds={selectedIds} 
                    setSelectedIds={setSelectedIds} 
                    setIsPrinting={setIsPrinting} 
                    setPaymentConfirm={setPaymentConfirm} 
                    loadAll={loadAll} 
                    askConfirm={askConfirm} 
                    association={association}

                          <option value="SAIDA">Saída (-)</option>

                              </option>
                            ))}
                          </Select>
                          <Select id="close-year">

                              <option key={y} value={y} selected={new Date().getFullYear() === y}>{y}</option>

                          </Select>

                            const m = document.getElementById('close-month').value;

                            askConfirm("Fechar Mês", `Deseja fechar o mês de ${mesNome}/${y}? Esta ação é irreversível.`, async () => {
                              setLoading(true);
                              try {
                                const res = await run('closeMonth', m, y);
                                if (res.success) {
                                  showToast("Mês fechado com sucesso!");
                                  loadAll();
                                } else {
                                  showToast(res.message, "error");
                                }
                              } catch (err) {
                                showToast("Erro ao fechar mês.", "error");
                              }
                              setLoading(false);
                              setConfirm(null);
                            });
                          }}
                          className="w-full py-3"
                          icon="lock"
                        >
                          Confirmar Fechamento
                        </Button>
                      </div>
                    </Card>
                  </div>
                    <div className="lg:col-span-2 space-y-6">
                    {(() => {

                        .filter(i => cashFlowView === 'all' ? true : i.status === 'ABERTO')

                        <Card

                            <div className="flex flex-wrap items-center gap-2">
                              <div className="flex bg-[#dee2e6] p-1 rounded-xl">
                                <button
                                  onClick={() => { setCashFlowView('open'); setSelectedCashFlowIds([]); }}
                                  className={`px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all ${
                                    cashFlowView === 'open' ? 'bg-white text-[#005c46] shadow-sm' : 'text-[#6c757d] hover:text-[#212529]'
                                  }`}

                                  Em Aberto
                                </button>
                                <button
                                  onClick={() => { setCashFlowView('all'); setSelectedCashFlowIds([]); }}
                                  className={`px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all ${
                                    cashFlowView === 'all' ? 'bg-white text-[#005c46] shadow-sm' : 'text-[#6c757d] hover:text-[#212529]'
                                  }`}
                                >
                                  Todos
                                </button>
                              </div>
                              {selectedCashFlowIds.length > 0 && (
                                <Button onClick={handlePrintSelectedCashFlow} variant="success" icon="file-text" className="py-1.5 px-3 whitespace-nowrap">
                                  Balanço Parcial ({selectedCashFlowIds.length})
                                </Button>
                              )}
                            </div>
                          }
                        >
                          <div className="overflow-x-auto -mx-5">
                            <table className="w-full custom-table">
                              <thead>
                                <tr>
                                  <th className="w-10">
                                    <input
                                      type="checkbox"
                                      className="w-4 h-4 rounded border-[#dee2e6]"

                                        if (e.target.checked) setSelectedCashFlowIds(visibleEntries.map(i => i.id));
                                        else setSelectedCashFlowIds([]);
                                      }}
                                      checked={allSelected}
                                    />
                                  </th>
                                  <th>Data</th>
                                  <th>Descrição</th>

                                        <td>
                                          <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase border ${isClosed ? 'bg-[#dee2e6] text-[#6c757d] border-[#dee2e6]' : 'bg-[#f58220]/10 text-[#f58220] border-[#f58220]/20'}`}>

                                            </a>

                                            <button onClick={() => document.getElementById(`file-upload-${i.id}`).click()} className="p-2 text-[#6c757d] hover:text-[#005c46] hover:bg-[#005c46]/10 rounded-lg transition-all" title="Anexar Comprovante">
                                              <Icon name="upload" size={16} />

                                            type="file"

                          >
                            Visualizar Relatório
                          </Button>

                              icon="download"

                                const element = document.getElementById('report-to-print');
                                const opt = { margin: 10, filename: `relatorio_${reportPreview.status.toLowerCase()}_${new Date().getTime()}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
                                html2pdf().set(opt).from(element).save();
                              }}
                            >
                              Baixar PDF
                            </Button>
                            <Button variant="secondary" className="w-full py-3" onClick={() => setReportPreview(null)}>
                              Fechar Prévia
                            </Button>
                          </div>
                        </Card>
                      )}
                    </div>

                      {reportPreview ? (
                        <Card title="Pré-visualização" subtitle="Documento pronto para impressão">

                                <h1 className="text-2xl font-black uppercase tracking-tighter text-[#005c46]">RELATÓRIO FINANCEIRO</h1>

                              </div>
                              <div className="text-right text-[10px] font-bold text-[#6c757d] uppercase tracking-widest leading-relaxed">

                                    <td className="font-bold text-[#212529]">R$ {Number(i.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                                    <td>
                                      <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${i.status === 'PAID' ? 'bg-[#28a745]/10 text-[#28a745]' : i.status === 'PENDING' ? 'bg-[#f58220]/10 text-[#f58220]' : 'bg-[#f8f9fa] text-[#6c757d]'}`}>
                                        {i.status === 'PAID' ? 'PAGO' : i.status === 'PENDING' ? 'PENDENTE' : 'BAIXADO'}
                                      </span>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </Card>
                      ) : (
                        <Card title="Histórico de Fechamentos Mensais" subtitle="Relatórios consolidados de períodos encerrados">
                          <div className="space-y-4">
                            {(() => {
                              const monthsWithClosedEntries = [...new Set(cashflow.filter(i => String(i.status).toUpperCase() === 'FECHADO').map(i => i.mesreferencia))];
                              const displayMonths = [...closedMonths];
                              monthsWithClosedEntries.forEach(ma => {
                                if (!displayMonths.find(m => m.mes_ano === ma)) {
                                  const [m, y] = ma.split('/').map(Number);
                                  displayMonths.push({ mes: m, ano: y, mes_ano: ma, data_fechamento: null, usuario: 'SISTEMA' });
                                }
                              });

                              if (displayMonths.length === 0) {
                                return <div className="py-12 text-center text-slate-400 italic text-sm">Nenhum fechamento realizado.</div>;
                              }

                              return displayMonths.sort((a, b) => {
                                const dateA = new Date(a.ano, a.mes - 1);
                                const dateB = new Date(b.ano, b.mes - 1);
                                return dateB - dateA;
                              }).map(closed => {
                                const mesAno = closed.mes_ano;
                                const targetDate = new Date(closed.ano, closed.mes - 1, 1);
                                const saldoAnterior = cashflow.reduce((acc, curr) => {
                                  const [cm, cy] = curr.mesreferencia.split('/').map(Number);
                                  const entryDate = new Date(cy, cm - 1, 1);
                                  if (entryDate < targetDate) {
                                    const v = Number(curr.valor) || 0;
                                    return curr.tipo === 'ENTRADA' ? acc + v : acc - v;
                                  }
                                  return acc;
                                }, 0);

                                const entries = cashflow.filter(i => i.mesreferencia === mesAno && String(i.status).toUpperCase() === 'FECHADO');
                                const totalE = entries.filter(e => e.tipo === 'ENTRADA').reduce((acc, curr) => acc + Number(curr.valor), 0);
                                const totalS = entries.filter(e => e.tipo === 'SAIDA').reduce((acc, curr) => acc + Number(curr.valor), 0);
                                const saldoPeriodo = totalE - totalS;
                                
                                return (
                                  <details key={mesAno} className="group border border-[#dee2e6] rounded-xl overflow-hidden transition-all bg-white hover:border-[#005c46]/30">
                                    <summary className="p-4 cursor-pointer hover:bg-[#f8f9fa] flex justify-between items-center list-none">
                                      <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 bg-[#f8f9fa] text-[#6c757d] rounded-lg flex items-center justify-center group-open:rotate-180 transition-all">
                                          <Icon name="chevron-down" size={16} />
                                        </div>
                                        <div>
                                          <p className="font-bold text-[#212529] uppercase text-sm">{mesAno}</p>
                                          <p className="text-[10px] text-[#6c757d] uppercase font-medium">
                                            {closed.data_fechamento ? `Fechado em: ${new Date(closed.data_fechamento).toLocaleDateString('pt-BR')}` : 'Consolidado'}
                                          </p>
                                        </div>
                                      </div>
                                      <div className="flex items-center gap-4">
                                        <div className="text-right hidden sm:block">
                                          <p className="text-[9px] font-bold text-[#6c757d] uppercase">Saldo Final</p>
                                          <p className={`text-xs font-bold ${saldoAnterior + saldoPeriodo >= 0 ? 'text-[#28a745]' : 'text-[#dc3545]'}`}>
                                            R$ {(saldoAnterior + saldoPeriodo).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                          </p>
                                        </div>
                                        <button 
                                          onClick={(e) => { e.preventDefault(); e.stopPropagation(); handlePrintMonth(mesAno, entries, totalE, totalS, saldoAnterior); }}
                                          className="p-2 bg-[#212529] text-white rounded-lg hover:bg-[#000000] transition-all"
                                          title="Imprimir"
                                        >
                                          <Icon name="printer" size={16} />
                                        </button>
                                      </div>
                                    </summary>
                                    <div className="p-4 bg-[#f8f9fa] border-t border-[#dee2e6] space-y-4">
                                      <div className="grid grid-cols-3 gap-2">
                                        <div className="bg-white p-2 rounded-lg border border-[#dee2e6] text-center">
                                          <p className="text-[8px] font-bold text-[#6c757d] uppercase">Anterior</p>
                                          <p className="text-[10px] font-bold text-[#212529]">R$ {saldoAnterior.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                        </div>
                                        <div className="bg-white p-2 rounded-lg border border-[#dee2e6] text-center">
                                          <p className="text-[8px] font-bold text-[#6c757d] uppercase">Período</p>
                                          <p className={`text-[10px] font-bold ${saldoPeriodo >= 0 ? 'text-[#28a745]' : 'text-[#dc3545]'}`}>R$ {saldoPeriodo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                        </div>
                                        <div className="bg-[#212529] p-2 rounded-lg text-center">
                                          <p className="text-[8px] font-bold text-[#6c757d] uppercase">Total</p>
                                          <p className="text-[10px] font-bold text-white">R$ {(saldoAnterior + saldoPeriodo).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                                        </div>
                                      </div>
                                      <div className="flex justify-between items-center mb-2">
                                        <h4 className="text-[10px] font-bold text-[#6c757d] uppercase tracking-widest">Detalhamento do Período</h4>
                                        {selectedCashFlowIds.length > 0 && (
                                          <Button onClick={handlePrintSelectedCashFlow} variant="success" icon="file-text" className="py-1 px-3 text-[10px]">
                                            Balanço Parcial ({selectedCashFlowIds.length})
                                          </Button>
                                        )}
                                      </div>
                                      <table className="w-full text-[10px]">
                                        <thead>
                                          <tr className="text-left border-b border-[#dee2e6]">
                                            <th className="w-8 pb-1">
                                              <input 
                                                type="checkbox" 
                                                className="w-3 h-3 rounded border-[#dee2e6]" 
                                                onChange={(e) => {
                                                  const ids = entries.map(i => i.id);
                                                  if (e.target.checked) setSelectedCashFlowIds([...new Set([...selectedCashFlowIds, ...ids])]);
                                                  else setSelectedCashFlowIds(selectedCashFlowIds.filter(id => !ids.includes(id)));
                                                }}
                                                checked={entries.every(i => selectedCashFlowIds.includes(i.id))}
                                              />
                                            </th>
                                            <th className="pb-1">Data</th>
                                            <th className="pb-1">Descrição</th>
                                            <th className="pb-1 text-right">Valor</th>
                                            <th className="pb-1 text-right">Anexo</th>
                                          </tr>
                                        </thead>
                                        <tbody>
                                          {entries.map(e => (
                                            <tr key={e.id} className="border-b border-[#dee2e6]/50">
                                              <td className="py-1">
                                                <input 
                                                  type="checkbox" 
                                                  className="w-3 h-3 rounded border-[#dee2e6] text-[#005c46] focus:ring-[#005c46]" 
                                                  checked={selectedCashFlowIds.includes(e.id)} 
                                                  onChange={(ev) => {
                                                    if (ev.target.checked) setSelectedCashFlowIds([...selectedCashFlowIds, e.id]);
                                                    else setSelectedCashFlowIds(selectedCashFlowIds.filter(id => id !== e.id));
                                                  }} 
                                                />
                                              </td>
                                              <td className="py-1 text-[#6c757d]">{e.data}</td>
                                              <td className="py-1 font-bold text-[#212529]">{e.descricao}</td>
                                              <td className={`py-1 text-right font-bold ${e.tipo === 'ENTRADA' ? 'text-[#28a745]' : 'text-[#dc3545]'}`}>R$ {Number(e.valor).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                                              <td className="py-1 text-right">
                                                {e.anexo && (
                                                  <a href={e.anexo} target="_blank" rel="noopener noreferrer" className="text-[#005c46] hover:text-[#004a38]" title="Ver Comprovante">
                                                    <Icon name="paperclip" size={12} />
                                                  </a>
                                                )}
                                              </td>
                                            </tr>
                                          ))}
                                        </tbody>
                                      </table>
                                    </div>
                                  </details>
                                );
                              });
                            })()}
                          </div>
                        </Card>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'settings' && (
                <div className="max-w-4xl mx-auto space-y-6">
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-1">
                      <Card title="Identidade" subtitle="Logotipo da associação">
                        <div className="space-y-4">
                          <div className="flex justify-center p-6 bg-slate-50 rounded-2xl border border-slate-100">
                            {association.logo ? (
                              <img src={association.logo} className="w-32 h-32 object-contain bg-white rounded-xl p-2 shadow-sm" referrerPolicy="no-referrer" />
                            ) : (
                              <div className="w-32 h-32 bg-white border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center text-slate-300">
                                <Icon name="image" size={40} />
                              </div>
                            )}
                          </div>
                          <input 
                            id="logo-upload"
                            type="file" 
                            accept="image/*" 
                            className="hidden" 
                            onChange={async (e) => {
                              const file = e.target.files[0];
                              if (file) {
                                const rawBase64 = await new Promise((resolve) => {
                                  const reader = new FileReader();
                                  reader.onload = (ev) => resolve(ev.target.result);
                                  reader.readAsDataURL(file);
                                });
                                const logoBase64 = await resizeImage(rawBase64);
                                await run('saveAssociation', { ...association, logo: logoBase64 });
                                showToast("Logo atualizado!");
                                loadAll();
                              }
                            }}
                          />
                          <Button variant="secondary" className="w-full" onClick={() => document.getElementById('logo-upload').click()}>
                            Alterar Logo
                          </Button>
                        </div>
                      </Card>
                    </div>

                    <div className="lg:col-span-2 space-y-6">
                      <Card title="Dados Gerais" subtitle="Informações oficiais e PIX">
                        <form className="space-y-4" onSubmit={async (e) => {
                          e.preventDefault();
                          const d = new FormData(e.target);
                          await run('saveAssociation', { 
                            name: d.get('name'), 
                            cnpj: d.get('cnpj'), 
                            pix_key: d.get('pix'), 
                            logo: association.logo, 
                            city: d.get('city') 
                          });
                          showToast("Configurações salvas!");
                          loadAll();
                        }}>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <Input label="Nome da Associação" name="name" defaultValue={association.name} required />
                            <Input label="CNPJ" name="cnpj" defaultValue={association.cnpj} placeholder="00.000.000/0000-00" />
                            <Input label="Chave PIX" name="pix" defaultValue={association.pix_key} required />
                            <Input label="Cidade (PIX)" name="city" defaultValue={association.city} required />
                          </div>
                          <Button type="submit" className="w-full py-3" icon="save">Salvar Alterações</Button>
                        </form>
                      </Card>

                      {currentUser.role === 'ADMIN' && (
                        <Card title="Gestão de Usuários" subtitle="Acesso ao sistema" action={
                          <Button size="sm" onClick={() => { setEditingUser(null); setShowUserModal(true); }}>+ Novo Usuário</Button>
                        }>
                          <div className="overflow-x-auto -mx-5">
                            <table className="w-full custom-table">
                              <thead>
                                <tr>
                                  <th>Nome</th>
                                  <th>Usuário</th>
                                  <th>Nível</th>
                                  <th className="text-right">Ações</th>
                                </tr>
                              </thead>
                              <tbody>
                                {users.map(u => (
                                  <tr key={u.id} className="hover:bg-[#f8f9fa] transition-all">
                                    <td className="font-bold text-[#212529]">{u.nome}</td>
                                    <td className="text-[#6c757d]">{u.usuario}</td>
                                    <td>
                                      <span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase ${u.role === 'ADMIN' ? 'bg-[#005c46]/10 text-[#005c46]' : 'bg-[#f8f9fa] text-[#6c757d]'}`}>
                                        {u.role}
                                      </span>
                                    </td>
                                    <td className="text-right">
                                      <div className="flex justify-end gap-1">
                                        <button onClick={() => { setEditingUser(u); setShowUserModal(true); }} className="p-2 text-[#6c757d] hover:text-[#005c46] hover:bg-[#005c46]/10 rounded-lg transition-all">
                                          <Icon name="edit-3" size={16} />
                                        </button>
                                        <button onClick={() => askConfirm("Excluir Usuário", `Deseja excluir ${u.nome}?`, async () => { await run('deleteUser', u.id); loadAll(); showToast("Usuário excluído."); setConfirm(null); })} className="p-2 text-[#6c757d] hover:text-[#dc3545] hover:bg-[#dc3545]/10 rounded-lg transition-all">
                                          <Icon name="trash-2" size={16} />
                                        </button>
                                      </div>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </Card>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>

            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
            {confirm && <ConfirmModal title={confirm.title} message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
            {reconciliationResults && (
              <ReconciliationModal 
                data={reconciliationResults}
                onCancel={() => setReconciliationResults(null)}
                onConfirm={async () => {
                  setLoading(true);
                  try {
                    await run('executeReconciliation', reconciliationResults);
                    showToast("Conciliação concluída com sucesso!");
                    setReconciliationResults(null);
                    loadAll();
                  } catch (err) {
                    showToast("Erro ao executar conciliação", "error");
                  }
                  setLoading(false);
                }}
              />
            )}
            {paymentConfirm && (
              <PaymentModal 
                installment={paymentConfirm}
                onCancel={() => setPaymentConfirm(null)}
                onConfirm={async (skipCashFlow) => {
                  setLoading(true);
                  try {
                    await run('updateInstallmentStatus', paymentConfirm.id, 'PAID', skipCashFlow);
                    showToast(skipCashFlow ? "Baixa realizada (sem caixa)." : "Pagamento registrado com sucesso!");
                    setPaymentConfirm(null);
                    loadAll();
                  } catch (err) {
                    showToast("Erro ao atualizar status.", "error");
                  }
                  setLoading(false);
                }}
              />
            )}
            {showMemberModal && (
              <MemberModal 
                member={editingMember}
                onCancel={() => { setShowMemberModal(false); setEditingMember(null); }} 
                onSave={async (data) => {
                  if(!data.name || !data.cpf) return showToast("Preencha todos os campos", "error");
                  if (data.id) {
                    await run('updateMember', { ...data, pilot_number: '', street: '', number: '', zip_code: '', city: '', state: '' });
                    showToast("Associado atualizado!");
                  } else {
                    await run('saveMember', { ...data, pilot_number: '', street: '', number: '', zip_code: '', city: '', state: '' });
                    showToast("Associado cadastrado!");
                  }
                  setShowMemberModal(false);
                  setEditingMember(null);
                  loadAll();
                }} 
              />
            )}
            {showUserModal && (
              <UserModal 
                user={editingUser}
                onCancel={() => { setShowUserModal(false); setEditingUser(null); }} 
                onSave={async (data) => {
                  if (!data.username || !data.name) return showToast("Preencha usuário e nome", "error");
                  if (!data.id && !data.password) return showToast("Informe uma senha para o novo usuário", "error");
                  await run('saveUser', data);
                  showToast(data.id ? "Usuário atualizado!" : "Usuário cadastrado!");
                  setShowUserModal(false);
                  setEditingUser(null);
                  loadAll();
                }}
              />
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
